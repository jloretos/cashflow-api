services:
  postgres:
    image: postgres:16
    container_name: cashflow-postgres
    environment:
      POSTGRES_DB: cashflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cashflow-postgres-data:/var/lib/postgresql/data

volumes:
  cashflow-postgres-data: